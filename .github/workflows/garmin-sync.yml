name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 23 * * *'    #  7 AM SGT
    - cron: '0 2 * * *'    # 10 AM SGT
    - cron: '0 4 * * *'    # 12 PM SGT
    - cron: '0 7 * * *'    #  3 PM SGT
    - cron: '0 10 * * *'   #  6 PM SGT
    - cron: '0 13 * * *'   #  9 PM SGT
    - cron: '0 16 * * *'   # 12 AM SGT
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets exist
        run: |
          if [ -z "${{ secrets.GARMIN_TOKEN_B64 }}" ]; then
            echo "::error::GARMIN_TOKEN_B64 secret is not set"
            exit 1
          fi

      - name: Try Garmin sync
        id: sync
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          GARMIN_OAUTH_PROXY: ${{ secrets.GARMIN_OAUTH_PROXY }}
        run: |
          set -o pipefail
          python3 sync.py 3 2>&1 | tee sync_output.txt
          echo "sync_ok=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check sync result
        id: check
        run: |
          if [ "${{ steps.sync.outputs.sync_ok }}" != "true" ]; then
            echo "Sync failed (Python error). Dashboard-only update."
            echo "got_data=false" >> $GITHUB_OUTPUT
          elif grep -q "No real data fetched" sync_output.txt 2>/dev/null; then
            echo "No real data from API. Dashboard-only update."
            echo "got_data=false" >> $GITHUB_OUTPUT
          elif grep -q "429" sync_output.txt 2>/dev/null; then
            echo "Garmin API blocked (429). Dashboard-only update."
            echo "got_data=false" >> $GITHUB_OUTPUT
          else
            echo "got_data=true" >> $GITHUB_OUTPUT
          fi

      - name: Push workout to Garmin watch
        if: steps.check.outputs.got_data == 'true'
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python3 push_workout.py 2>&1 || echo "Workout push skipped or failed"
        continue-on-error: true

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Garmin Sync Bot"
          git config user.email "sync@garmin-ai"

          # Helper: strip conflict markers (keep ours)
          resolve_conflicts() {
            for f in $(grep -rl '<<<<<<< ' --include='*.json' --include='*.html' --include='*.md' . 2>/dev/null || true); do
              python3 -c "
          import re
          text = open('$f').read()
          text = re.sub(r'<<<<<<< [^\n]*\n(.*?)\n=======\n.*?\n>>>>>>> [^\n]*', lambda m: m.group(1), text, flags=re.DOTALL)
          open('$f', 'w').write(text)
          " && echo "Resolved conflicts in $f"
            done
          }

          # Pull first, resolve any conflicts
          git pull --rebase --quiet 2>/dev/null || {
            git rebase --abort 2>/dev/null || true
            git pull --quiet 2>/dev/null || {
              git diff --name-only --diff-filter=U 2>/dev/null | xargs -r git checkout --ours
              git diff --name-only --diff-filter=U 2>/dev/null | xargs -r git add
              git commit --no-edit 2>/dev/null || true
            }
          }
          resolve_conflicts

          if [ "${{ steps.check.outputs.got_data }}" = "true" ]; then
            git add garmin/ docs/
          else
            git add docs/ garmin/.last_workout_push 2>/dev/null || true
          fi
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M')"
          # Push with retry
          git push || {
            echo "Push failed, retrying after pull..."
            git pull --rebase --quiet || { git rebase --abort 2>/dev/null || true; git pull --quiet || true; }
            resolve_conflicts
            git add garmin/ docs/ 2>/dev/null || true
            git diff --cached --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M') retry"
            git push
          }
