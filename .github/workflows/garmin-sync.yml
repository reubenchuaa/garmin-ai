name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 23 * * *'    #  7 AM SGT
    - cron: '0 2 * * *'    # 10 AM SGT
    - cron: '0 4 * * *'    # 12 PM SGT
    - cron: '0 7 * * *'    #  3 PM SGT
    - cron: '0 10 * * *'   #  6 PM SGT
    - cron: '0 13 * * *'   #  9 PM SGT
    - cron: '0 16 * * *'   # 12 AM SGT
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Try Garmin sync
        id: sync
        continue-on-error: true
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          GARMIN_OAUTH_PROXY: ${{ secrets.GARMIN_OAUTH_PROXY }}
        run: python3 sync.py 3 2>&1 | tee sync_output.txt

      - name: Check if sync got real data
        id: check
        run: |
          if grep -q "429" sync_output.txt 2>/dev/null; then
            echo "Garmin API blocked (429). Skipping data commit, regenerating dashboard only."
            echo "got_data=false" >> $GITHUB_OUTPUT
          else
            echo "got_data=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate dashboard
        run: |
          git pull --quiet || true
          python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Garmin Sync Bot"
          git config user.email "sync@garmin-ai"
          if [ "${{ steps.check.outputs.got_data }}" = "true" ]; then
            git add garmin/ docs/
          else
            git add docs/
          fi
          git diff --cached --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d')"
          git pull --rebase --quiet || true
          git push
