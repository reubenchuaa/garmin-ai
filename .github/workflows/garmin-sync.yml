name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 23 * * *'    #  7 AM SGT
    - cron: '0 2 * * *'    # 10 AM SGT
    - cron: '0 4 * * *'    # 12 PM SGT
    - cron: '0 7 * * *'    #  3 PM SGT
    - cron: '0 10 * * *'   #  6 PM SGT
    - cron: '0 13 * * *'   #  9 PM SGT
    - cron: '0 16 * * *'   # 12 AM SGT
  workflow_dispatch:

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate secrets exist
        run: |
          if [ -z "${{ secrets.GARMIN_TOKEN_B64 }}" ]; then
            echo "::error::GARMIN_TOKEN_B64 secret is not set"
            exit 1
          fi

      - name: Try Garmin sync
        id: sync
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
          GARMIN_OAUTH_PROXY: ${{ secrets.GARMIN_OAUTH_PROXY }}
        run: |
          set -o pipefail
          python3 sync.py 3 2>&1 | tee sync_output.txt
          echo "sync_ok=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Check sync result
        id: check
        run: |
          if [ "${{ steps.sync.outputs.sync_ok }}" != "true" ]; then
            echo "Sync failed (Python error). Dashboard-only update."
            echo "got_data=false" >> $GITHUB_OUTPUT
          elif grep -q "No real data fetched" sync_output.txt 2>/dev/null; then
            echo "No real data from API. Dashboard-only update."
            echo "got_data=false" >> $GITHUB_OUTPUT
          elif grep -q "429" sync_output.txt 2>/dev/null; then
            echo "Garmin API blocked (429). Dashboard-only update."
            echo "got_data=false" >> $GITHUB_OUTPUT
          else
            echo "got_data=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Garmin Sync Bot"
          git config user.email "sync@garmin-ai"
          # Pull first to avoid push rejection
          git pull --rebase --quiet || git pull --quiet || true
          if [ "${{ steps.check.outputs.got_data }}" = "true" ]; then
            git add garmin/ docs/
          else
            git add docs/
          fi
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "sync: $(date -u '+%Y-%m-%d %H:%M')"
          # Push with retry
          git push || {
            echo "Push failed, retrying after pull..."
            git pull --rebase --quiet || git pull --quiet || true
            git push
          }
