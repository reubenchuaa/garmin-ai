name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 23 * * *'    #  7 AM SGT
    - cron: '0 2 * * *'    # 10 AM SGT
    - cron: '0 4 * * *'    # 12 PM SGT
    - cron: '0 7 * * *'    #  3 PM SGT
    - cron: '0 10 * * *'   #  6 PM SGT
    - cron: '0 13 * * *'   #  9 PM SGT
    - cron: '0 16 * * *'   # 12 AM SGT
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python3 sync.py 3

      - name: Generate dashboard
        run: python3 generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "Garmin Sync Bot"
          git config user.email "sync@garmin-ai"
          git add garmin/ docs/
          git diff --cached --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d')"
          git push
