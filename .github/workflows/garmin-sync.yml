name: Garmin Daily Sync

on:
  schedule:
    - cron: '0 22 * * *'   # 6 AM Singapore time (UTC+8 = 22:00 UTC previous day)
  workflow_dispatch:         # allows manual "Run workflow" button

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # needed to commit files back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Garmin sync
        env:
          GARMIN_TOKEN_B64: ${{ secrets.GARMIN_TOKEN_B64 }}
        run: python3 sync.py 3

      - name: Commit updated data
        run: |
          git config user.name "Garmin Sync Bot"
          git config user.email "sync@garmin-ai"
          git add garmin/
          git diff --cached --quiet || git commit -m "sync: $(date -u '+%Y-%m-%d')"
          git push
